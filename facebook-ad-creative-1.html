<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Ad Creative 1 - Free Analysis Visual</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
    }

    /* Container - 1080x1080 square for Instagram/Facebook */
    .ad-container {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
      border-radius: 0;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Content wrapper */
    .content {
      padding: 100px 80px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 60px;
    }

    /* Logo - small and subtle */
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      opacity: 0.9;
    }

    .logo-liora {
      color: #1e3a8a;
    }

    .logo-tech {
      color: #3b82f6;
    }

    /* Main Visual Card - The Report Mockup */
    .report-card {
      background: white;
      border-radius: 32px;
      padding: 70px 60px;
      box-shadow: 0 25px 50px -12px rgba(30, 58, 138, 0.15);
      border: 3px solid #dbeafe;
      position: relative;
    }

    /* Badge on top */
    .badge {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: white;
      padding: 15px 40px;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      box-shadow: 0 10px 20px -5px rgba(30, 58, 138, 0.3);
      letter-spacing: 0.5px;
    }

    /* Report Title */
    .report-title {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      color: #0f172a;
      text-align: center;
      margin-bottom: 50px;
      line-height: 1.3;
    }

    .report-title-highlight {
      color: #1e3a8a;
    }

    /* Opportunities List - Simplified */
    .opportunities {
      display: flex;
      flex-direction: column;
      gap: 35px;
    }

    .opportunity {
      display: flex;
      align-items: center;
      gap: 25px;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      padding: 30px 35px;
      border-radius: 20px;
      border: 2px solid #86efac;
    }

    .number-badge {
      background: #15803d;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .opportunity-text {
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.4;
    }

    .highlight {
      color: #15803d;
      font-weight: 700;
    }

    /* Decorative elements */
    .circle-decoration {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
    }

    .circle-1 {
      width: 400px;
      height: 400px;
      background: #3b82f6;
      top: -150px;
      right: -150px;
    }

    .circle-2 {
      width: 300px;
      height: 300px;
      background: #1e3a8a;
      bottom: -100px;
      left: -100px;
    }
  </style>
</head>
<body>
  <div class="ad-container">
    <!-- Decorative circles -->
    <div class="circle-decoration circle-1"></div>
    <div class="circle-decoration circle-2"></div>

    <div class="content">
      <!-- Logo -->
      <div class="logo">
        <span class="logo-liora">Liora</span><span class="logo-tech">Tech</span>
      </div>

      <!-- Report Card -->
      <div class="report-card">
        <div class="badge">FRÍTT · 30 MÍN · 0 KR</div>

        <div class="report-title">
          Þín <span class="report-title-highlight">AI Tækifæri</span>
        </div>

        <div class="opportunities">
          <div class="opportunity">
            <div class="number-badge">1</div>
            <div class="opportunity-text">
              Sjálfvirk bókhald · <span class="highlight">Sparar 3-5 klst</span>
            </div>
          </div>

          <div class="opportunity">
            <div class="number-badge">2</div>
            <div class="opportunity-text">
              AI viðskiptavinastuðningur · <span class="highlight">80% sjálfvirkt</span>
            </div>
          </div>

          <div class="opportunity">
            <div class="number-badge">3</div>
            <div class="opportunity-text">
              Sjálfvirk samfélagsmiðlar · <span class="highlight">10 mín/dag</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    console.log('📸 SCREENSHOT:');
    console.log('Right-click → Inspect → Right-click <div class="ad-container"> → Capture node screenshot');
  </script>
</body>
</html>
